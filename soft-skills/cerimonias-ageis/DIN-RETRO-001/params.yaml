identification:
  asset_id: "DIN-RETRO-001"
  name: "Retrospectiva Guiada"
  version: "RAS-3.0"
  repository_path: "soft-skills/cerimonias-ageis/DIN-RETRO-001/"
  author: "Equipe RAS — ras-dinamicas@institucional.br"
  last_updated: "2026-05-05"

classification:
  domain: "soft-skills"
  subdomain: "cerimonias-ageis"
  complexity: "Média"
  duration_minutes: 50
  group_size: "3-10"
  tags:
    - "Retrospectiva"
    - "Melhoria Contínua"
    - "Reflexão de Time"
    - "Métricas de Sprint"
    - "Abertura a Feedback"
    - "Onboarding"
  hard_skills: []
  soft_skills:
    - "Reflexão Crítica Coletiva"
    - "Melhoria Contínua"
    - "Abertura a Feedback"
  neurodiversity_summary: >
    A fase de escrita em silêncio (Gather Data) elimina pressão de improviso oral,
    permitindo que cada participante processe e expresse percepções no próprio ritmo.
    A estrutura das 5 fases (Derby & Larsen) oferece previsibilidade máxima: cada etapa
    é anunciada antes de iniciar, o tempo de cada fase é exibido em timer visível, e a
    progressão é linear e não-ambígua. Post-its físicos ou digitais reduzem necessidade
    de comunicação verbal contínua.
  agile_context:
    methodology: "Scrum / Agile"
    sprint_moment: "fim"
    use_scenario:
      - "Reuniões de retrospectiva ao final de sprints"
      - "Workshops de agilidade"
      - "Onboarding de times em processo de retrospectiva estruturada"
  target_audience:
    roles:
      - "Scrum Master"
      - "Desenvolvedor"
      - "Product Owner"
      - "QA / Tester"
      - "Qualquer membro de time ágil"
    team_size_min: 3
    team_size_max: 10
    prerequisites: "Conhecimento básico de Scrum e retrospectivas"
  business_problem: >
    Retrospectivas ineficazes com falta de engajamento; times que não se integram ao
    processo de melhoria contínua no onboarding (E3.x — ICSE 2021).

usage:
  target_roles:
    - "Scrum Master"
    - "Desenvolvedor"
    - "Product Owner"
    - "QA / Tester"
  prerequisites:
    - "Conhecimento básico de Scrum e retrospectivas"
  learning_objectives:
    - "Conduzir retrospectiva estruturada no modelo Derby & Larsen (5 fases)"
    - "Identificar padrões de melhoria a partir de dados coletados no sprint"
    - "Definir ações concretas com dono e prazo"
    - "Desenvolver cultura de melhoria contínua e reflexão coletiva"
  facilitation_level: "Intermediário"
  accessibility_compliance:
    - "OAP-1.0"

  duration_minutes:
    set_the_stage: 5
    gather_data: 10
    generate_insights: 15
    decide_what_to_do: 15
    close_the_retrospective: 5
    total: 50

  physical_requirements:
    space_m2_min: 15
    layout: "Sala de reunião com quadro branco ou digital; espaço para circulação"

  materials:
    - item: "Quadro branco ou digital (Miro, Metroretro)"
      quantity_min: 1
    - item: "Post-its (3 cores diferentes)"
      quantity_min: 30
    - item: "Marcadores"
      quantity_min: 10
    - item: "Timer visível (físico ou projetado)"
      quantity_min: 1

  scaffolding:
    rules:
      - "Cada fase tem duração fixa — timer deve ser visível a todos"
      - "Gather Data é em silêncio — sem discussão durante a escrita dos post-its"
      - "Nenhum post-it é julgado ou descartado durante a leitura"
      - "Ações devem ter dono e prazo definidos — sem ações sem responsável"
    steps:
      - step: 1
        phase: "Preparação"
        duration_min: 0
        description: "Preparar quadro com 3 colunas: 'O que foi bem?', 'O que pode melhorar?', 'Ações'."
      - step: 2
        phase: "Set the Stage"
        duration_min: 5
        description: "Check-in: cada pessoa diz uma palavra ou emoji sobre como está chegando."
      - step: 3
        phase: "Gather Data"
        duration_min: 10
        description: "Silêncio — todos escrevem post-its e colam nas colunas. Facilitador lê em voz alta sem julgamento."
      - step: 4
        phase: "Generate Insights"
        duration_min: 15
        description: "Agrupar post-its similares; nomear cada cluster; votar nos clusters mais importantes."
      - step: 5
        phase: "Decide What to Do"
        duration_min: 15
        description: "Top 1–3 clusters → ação concreta + dono + prazo."
      - step: 6
        phase: "Close the Retrospective"
        duration_min: 5
        key_question: "Esta retro foi útil? Como melhorar a próxima?"
        core_lesson: "Melhoria contínua é processo — cada retro deve melhorar a próxima"

  effectiveness_kpis:
    - id: "KPI-1"
      name: "Número de ações de melhoria propostas"
      measurement: "ART-10C — contagem direta"
      construct: "Aprendizado (E1.x)"
    - id: "KPI-2"
      name: "Taxa de implementação das ações (%)"
      measurement: "ART-10C — acompanhamento no sprint seguinte"
      construct: "Confiança (E2.x)"

artifacts:
  - id: "ART-10A"
    name: "Template de Retrospectiva"
    type: Markdown
    path: "DIN-RETRO-001/template_retrospectiva.md"
  - id: "ART-10B"
    name: "Guia do Facilitador"
    type: Markdown
    path: "DIN-RETRO-001/guia_facilitador.md"
  - id: "ART-10C"
    name: "Ficha KPI"
    type: XLSX
    path: "DIN-RETRO-001/registro_kpi.xlsx"

quality:
  validation_status: "Em validação interna"
  quality_level: "medio"
  reviewed_by: "Equipe de Agilidade e facilitadores internos"
  version_history:
    - version: "1.0.0"
      date: "2026-05"
      description: "Versão inicial estruturada em RAS 3.0."
  references:
    - "Derby, E. & Larsen, D. (2006). Agile Retrospectives: Making Good Teams Great. Pragmatic Bookshelf."
    - "Hundhausen, C. et al. (2024). Sprint Retrospectives in Undergraduate Teams. ICSE SEET."
    - "Ju, A. et al. (2021). ICSE 2021, pp.613–623."
    - "Hause, M. et al. (2025). RAS 3.0. INCOSE INSIGHT, Vol.28/5."
